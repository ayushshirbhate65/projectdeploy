spring.application.name=DigitalKrishiBazaar
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# FIX: JWT secret moved out of source code (JwtUtil.java) and into config.
# Set this as an environment variable JWT_SECRET in your deployment.
# Must be at least 32 characters long for HS256.
jwt.secret=${JWT_SECRET}